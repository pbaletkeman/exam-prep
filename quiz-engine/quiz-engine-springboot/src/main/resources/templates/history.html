<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - GH-200</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #0d1117; color: #c9d1d9; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; gap: 2rem; }
        nav a { color: #8b949e; text-decoration: none; } nav a:hover { color: #58a6ff; }
        h1 { color: #58a6ff; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
        th { background: #21262d; padding: 0.75rem 1rem; text-align: left; color: #8b949e; border-bottom: 1px solid #30363d; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #21262d; }
        tr:hover td { background: #1c2128; }
        .pass { color: #2ea043; font-weight: bold; }
        .fail { color: #f85149; font-weight: bold; }
        .empty { text-align: center; padding: 3rem; color: #8b949e; }
        .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; }
        .pagination a { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; }
        .pagination a:hover { background: #30363d; }
        .pagination .current { background: #238636; border-color: #238636; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/quiz">Take Quiz</a>
        <a href="/history">History</a>
    </nav>
    <div class="container">
        <h1>Quiz History</h1>

        <table th:if="${sessions.totalElements > 0}">
            <thead>
                <tr>
                    <th>Session ID</th>
                    <th>Date</th>
                    <th>Questions</th>
                    <th>Correct</th>
                    <th>Score</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="session : ${sessions.content}">
                    <td th:text="${#strings.abbreviate(session.sessionId, 12) + '...'}">id</td>
                    <td th:text="${session.startedAt != null ? #temporals.format(session.startedAt, 'yyyy-MM-dd HH:mm') : 'N/A'}">date</td>
                    <td th:text="${session.numQuestions}">10</td>
                    <td th:text="${session.numCorrect}">8</td>
                    <td th:class="${session.percentageCorrect >= 75 ? 'pass' : 'fail'}"
                        th:text="${#numbers.formatDecimal(session.percentageCorrect, 1, 1) + '%'}">80%</td>
                    <td th:text="${session.timeTakenSeconds != null ? session.timeTakenSeconds + 's' : 'N/A'}">60s</td>
                </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${sessions.totalElements == 0}">
            <p>No quiz history yet. <a href="/quiz" style="color: #58a6ff;">Take your first quiz!</a></p>
        </div>

        <div class="pagination" th:if="${sessions.totalPages > 1}">
            <a th:href="@{/history(page=${currentPage - 1})}" th:if="${currentPage > 0}">&#x2190; Prev</a>
            <th:block th:each="i : ${#numbers.sequence(0, sessions.totalPages - 1)}">
                <a th:href="@{/history(page=${i})}"
                   th:text="${i + 1}"
                   th:class="${i == currentPage ? 'current' : ''}">1</a>
            </th:block>
            <a th:href="@{/history(page=${currentPage + 1})}" th:if="${currentPage < sessions.totalPages - 1}">Next &#x2192;</a>
        </div>
    </div>
</body>
</html>
